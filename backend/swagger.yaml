swagger: '2.0'
info:
  title: Bank Argent API documentation
  description: Contains all available API endpoints in this codebase
  version: '1.0.0'
  termsOfService: 'http://swagger.io/terms/'
host: localhost:3001
basePath: /api/v1
schemes:
  - http
paths:
  /user/login:
    post:
      tags:
        - User Module
      summary: Login
      description: API for Login
      parameters:
        - in: body
          name: body
          description: Login Payload
          required: true
          schema:
            $ref: '#/definitions/Login'
      produces:
        - application/json
      responses:
        '200':
          description: Login Successfully
          schema:
            $ref: '#/definitions/LoginResponse'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error
  /user/signup:
    post:
      tags:
        - User Module
      summary: Signup
      description: API for Signup
      parameters:
        - in: body
          name: body
          description: Signup Payload
          required: true
          schema:
            $ref: '#/definitions/User'
      produces:
        - application/json
      responses:
        '201':
          description: Signup Successfully
          schema:
            $ref: '#/definitions/ApiResponse'
        '400':
          description: Invalid Fields
        '500':
          description: Internal Server Error
  /user/profile:
    post:
      security:
        - Bearer: []
      tags:
        - User Module
      summary: Get User Profile
      description: API for fetching a user profile
      produces:
        - application/json
      responses:
        '200':
          description: User profile retrieved successfully
          schema:
            $ref: '#/definitions/UserProfileApiResponse'
        '400':
          description: Invalid Fields
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
    put:
      security:
        - Bearer: []
      tags:
        - User Module
      summary: Update User Profile
      description: API for updating a user profile
      parameters:
        - in: body
          name: body
          description: Update user profile attributes
          required: true
          schema:
            $ref: '#/definitions/UserProfile'
      produces:
        - application/json
      responses:
        '200':
          description: User profile updated successfully
          schema:
            $ref: '#/definitions/UserProfileApiResponse'
        '400':
          description: Invalid Fields
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
  # Endpoints Accounts
  /accounts:
    get:
      security:
        - Bearer: []
      tags:
        - Accounts Module
      summary: Get User Accounts
      description: API for fetching all accounts of the authenticated user
      produces:
        - application/json
      responses:
        '200':
          description: User accounts retrieved successfully
          schema:
            $ref: '#/definitions/AccountsApiResponse'
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
  # Endpoints User Transactions
  /accounts/{accountId}/transactions:
    get:
      security:
        - Bearer: []
      tags:
        - Transactions Module
      summary: Get Account Transactions
      description: API for fetching the transactions of an account for a given month
      parameters:
        - in: path
          name: accountId
          description: ID of the account
          required: true
          type: string
        - in: query
          name: month
          description: Filter transactions by month (format YYYY-MM). Defaults is to the current month
          required: false
          type: string
      produces:
        - application/json
      responses:
        '200':
          description: Account transactions retrieved successfully
          schema:
            $ref: '#/definitions/TransactionsApiResponse'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Account not found
        '500':
          description: Internal Server Error
  /accounts/{accountId}/transactions/{transactionId}:
    get:
      security:
        - Bearer: []
      tags:
        - Transactions Module
      summary: Get Transaction Details
      description: API for fetching the details of a specific transaction
      parameters:
        - in: path
          name: accountId
          description: ID of the account
          required: true
          type: string
        - in: path
          name: transactionId
          description: ID of the transaction
          required: true
          type: string
      produces:
        - application/json
      responses:
        '200':
          description: Transaction retrieved successfully
          schema:
            $ref: '#/definitions/TransactionApiResponse'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Transaction not found
        '500':
          description: Internal Server Error
    patch:
      security:
        - Bearer: []
      tags:
        - Transactions Module
      summary: Update Transaction Information
      description: API for adding, updating or removing the category and/or notes of a transaction. Send a field with an empty string to clear its value
      parameters:
        - in: path
          name: accountId
          description: ID of the account
          required: true
          type: string
        - in: path
          name: transactionId
          description: ID of the transaction
          required: true
          type: string
        - in: body
          name: body
          description: Editable transaction fields (category and notes)
          required: true
          schema:
            $ref: '#/definitions/UserTransaction'
      produces:
        - application/json
      responses:
        '200':
          description: Transaction updated successfully
          schema:
            $ref: '#/definitions/TransactionApiResponse'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Transaction not found
        '500':
          description: Internal Server Error
securityDefinitions:
  Bearer:
    type: apiKey
    name: Authorization
    in: header
definitions:
  User:
    required:
      - email
      - password
    properties:
      email:
        type: string
        description: user email
      password:
        type: string
        description: user password
      firstName:
        type: string
        description: user first name
      lastName:
        type: string
        description: user last name
  Login:
    required:
      - email
      - password
    properties:
      email:
        type: string
        description: user email
      password:
        type: string
        description: user password
  ApiResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        type: object
        properties:
          id:
            type: string
          email:
            type: string
  LoginResponse:
    type: object
    properties:
      token:
        type: string
  UserProfile:
    type: object
    properties:
      firstName:
        type: string
      lastName:
        type: string
  UserProfileApiResponse:
    type: object
    properties:
      status:
        type: integer
      message:
        type: string
      body:
        type: object
        properties:
          id:
            type: string
          email:
            type: string
          firstName:
            type: string
          lastName:
            type: string
  Account:
    type: object
    properties:
      accountId:
        type: string
        example: '5f0f4a2b9d1c2a0017c3e4b1'
      title:
        type: string
        example: 'Argent Bank Checking (x8349)'
      balance:
        type: integer
        description: Account balance in cents (e.g. 208279 = $2,082.79)
        example: 208279
      balanceType:
        type: string
        example: 'Available Balance'
      currency:
        type: string
        example: 'USD'
  AccountsApiResponse:
    type: object
    properties:
      status:
        type: integer
        example: 200
      message:
        type: string
        example: 'Accounts retrieved successfully'
      body:
        type: array
        items:
          $ref: '#/definitions/Account'
  TransactionSummary:
    type: object
    properties:
      transactionId:
        type: string
        example: '5f0f4a2b9d1c2a0017c3e4b2'
      accountId:
        type: string
        example: '5f0f4a2b9d1c2a0017c3e4b1'
      date:
        type: string
        format: date-time
        example: '2020-06-20T14:35:00Z'
      description:
        type: string
        example: 'Golden Sun Bakery'
      amount:
        type: integer
        description: Transaction amount in cents
        example: 800
      balance:
        type: integer
        description: Account balance after the transaction, in cents
        example: 207479
      currency:
        type: string
        example: 'USD'
  Transaction:
    type: object
    properties:
      transactionId:
        type: string
        example: '5f0f4a2b9d1c2a0017c3e4b2'
      accountId:
        type: string
        example: '5f0f4a2b9d1c2a0017c3e4b1'
      date:
        type: string
        format: date-time
        example: '2020-06-20T14:35:00Z'
      description:
        type: string
        example: 'Golden Sun Bakery'
      amount:
        type: integer
        description: Transaction amount in cents
        example: 800
      balance:
        type: integer
        description: Account balance after the transaction, in cents
        example: 207479
      transactionType:
        type: string
        example: 'Electronic'
      category:
        type: string
        example: 'Food'
      notes:
        type: string
        example: 'Lunch with the team'
      currency:
        type: string
        example: 'USD'
  TransactionsApiResponse:
    type: object
    properties:
      status:
        type: integer
        example: 200
      message:
        type: string
        example: 'Transactions retrieved successfully'
      body:
        type: array
        items:
          $ref: '#/definitions/TransactionSummary'
  TransactionApiResponse:
    type: object
    properties:
      status:
        type: integer
        example: 200
      message:
        type: string
        example: 'Transaction retrieved successfully'
      body:
        $ref: '#/definitions/Transaction'
  UserTransaction:
    type: object
    properties:
      category:
        type: string
        example: 'Food'
      notes:
        type: string
        example: 'Lunch with the team'
